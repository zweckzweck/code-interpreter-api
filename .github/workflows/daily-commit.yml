name: Daily Auto Commit

on:
  schedule:
    - cron: '15 2 * * *'   # Runs daily at 02:15 UTC (specific minute & hour)
  workflow_dispatch:       # Allows manual trigger for testing

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config user.name "DevSync Bot"
          git config user.email "23f1002714@ds.study.iitm.ac.in"

      - name: 23f1002714@ds.study.iitm.ac.in Daily Commit Step
        run: |
          echo "Last run: $(date -u)" >> daily_log.txt
          git add daily_log.txt
          git commit -m "Automated daily commit - $(date -u)" || echo "No changes to commit"
          git push
